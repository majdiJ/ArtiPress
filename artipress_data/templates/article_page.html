<!--
This is an example article page template.
You can use this as a base and modify it, or take the variables and sections and pase them into your own template.
If you do bring/create your own, make sure to update the template path in the config file to point to your new template.

If you try and preview this template without running the generator, you will see the variable names in curly brackets. These are the variables that ArtiPress will replace with actual values.

The variables/sections that you must include in your article list template are:
- 
These variables must be put in {html_var(...)} format.

You can edit the `article_list_section.css` styling to fit your site. Some other styling files are not recommended to be edited.
You can edit the article cards layout in the `article_item.html` template component.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta Tag(s) -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="index, follow">



    <!-- === ArtiPress ===
    You must include variable/section below in your article page template (In the <head> section) -->
    <title>{html_var(article_title)} | {html_var(website_title)}</title>
    <link rel="canonical" href="{html_var(base_url)}/{html_var(generated_output_path)}/{html_var(article_id)}" />
    <meta name="description" content="{html_var(article_strap_line)}" />
    <meta name="keywords" content="{html_var(article_keywords_list)}" />

    <!-- Article author meta tags will be inserted below -->
    {html_var(author_meta_tags)}

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:title" content="{html_var(article_title)} | {html_var(website_title)}">
    <meta property="og:description" content="{html_var(article_strap_line)}">
    <meta property="og:image" content="{html_var(article_featured_image)}">
    <meta property="og:url" content="{html_var(base_url)}/articles/{html_var(article_id)}">
    <meta property="og:type" content="article">

    <!-- Open Graph Article Metadata -->
    <meta property="article:published_time" content="{html_var(article_published_date_iso)}" />
    <meta property="article:modified_time" content="{html_var(article_edited_date_iso_iso)}" />

    <!-- Inser Open Graph Article Authors -->
    {html_var(og_meta_tags_authors)}

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{html_var(article_title)} | {html_var(website_title)}">
    <meta name="twitter:description" content="{html_var(article_strap_line)}">
    <meta name="twitter:image" content="{html_var(article_featured_image)}">
    <!-- END ArtiPress (End of needed section)-->



    <!-- Style(s) -->
    <link rel="stylesheet" href="/artipress_data/style/article_page_base.css" />
    <link rel="stylesheet" href="/artipress_data/style/base_md_elements.css" />

    <!-- Script(s) -->
    <link rel="stylesheet" href="/artipress_data/style/main.css" />
    <script src="/artipress_data/scripts/anchor_scroll.js" defer></script>
    <script src="/artipress_data/scripts/ISO_date_format_localised.js" defer></script>

    <!-- === ArtiPress ===
    You must include variable/section below in your article list template (In the <head> section, at the bottom) -->
    <script type="application/ld+json">
        {
        "@context": "https://schema.org",
        "@type": "Article",
        "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": "{html_var(base_url)}/articles/{html_var(article_id)}"
        },
        "headline": "{html_var(article_title)}",
        "description": "{html_var(article_strap_line)}",
        "image": [
            "{html_var(article_featured_image)}"
        ],
        "author": {html_var(json_ld_authors)},
        "publisher": {
            "@type": "Organization",
            "name": "{html_var(website_title)}",
            "logo": {
            "@type": "ImageObject",
            "url": "{html_var(website_logo)}"
            }
        },
        "datePublished": "{html_var(article_published_date_iso)}",
        "dateModified": "{html_var(article_edited_date_iso_iso)}"
        }
    </script>
    <!-- END ArtiPress (End of needed section)-->

</head>

<body>

    <header class="articles-page-header">
        <h1><a href="/">ArtiPress</a></h1>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/articles">All Articles</a></li>
                <li><a href="/articles/authors">Authors</a></li>
            </ul>
        </nav>
    </header>

    <main class="articles-page-main">

        <!-- === ArtiPress ===
        You must include variable/section below in your article page template (In the <main> section, where you want the article content to appear) -->
        {html_var(main_article_element)}
        <!-- END ArtiPress (End of needed section)-->

    </main>

    <footer>
        <div class="container-page-content-width">
            <p>
                &copy; 2026 ArtiPress. All rights reserved.
            </p>
        </div>
    </footer>
</body>

</html>
