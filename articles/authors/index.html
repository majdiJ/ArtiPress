<!--
This is an example author list template.
You can use this as a base and modify it, or take the variables and sections and paste them into your own template.
If you do bring/create your own, make sure to update the template path in the config file to point to your new template.

If you try and preview this template without running the generator, you will see the variable names in curly brackets. These are the variables that ArtiPress will replace with actual values.

The variables/sections that you must include in your author list template are:
- `author_list_styling_and_scripts` -> This variable contains the styling (CSS) and any needed script(s) (JS) for the author list part. You can edit these.
- `author_list_items` -> This variable contains the actual list of authors in HTML format. You must include this variable where you want the list of authors to be rendered.

These variables must be put in {html_var(...)} format.

You can edit the `author_list_cards.css` styling to fit your site.
You can edit the author cards layout in the `author_list_item.html` template component.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta Tag(s) -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="index, follow">

    <!-- Site specific meta tags -->
    <title>Authors - ArtiPress</title>
    <link rel="canonical" href="https://artipress.majdij.com/articles/authors" />
    <meta name="description" content="Static site article generator generator and builder without a backened database." />

    <!-- Style(s) -->
    <link rel="stylesheet" href="/artipress_data/style/main.css" />

    <!-- === ArtiPress ===
    You must include variable/section below in your author list template (In the <head> section) -->
    <link rel="stylesheet" href="/artipress_data/style/author_list_cards.css" />

    <!-- END ArtiPress (End of needed section)-->

</head>

<body>

    <header class="articles-page-header">
        <h1><a href="/">ArtiPress</a></h1>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/articles">All Articles</a></li>
                <li><a href="/articles/authors">Authors</a></li>
            </ul>
        </nav>
    </header>

    <main class="articles-list-page-main">

        <div class="page-section page-section-projects" id="projects-header">
            <h2>Authors</h2>
        </div>

        <!-- === ArtiPress ===
        You must include variable/section below in your author list template (In the <body> section, where you want the list of authors to be rendered) -->
        <div class="artipress-authors-container">

<a href="/articles/authors/john-doe/index.html" class="artipress-author-card">
    <img src="/artipress_data/authors/author_pictures/default.svg" alt="John Doe" class="artipress-author-card-avatar" />
    <div class="text-content">
        <h3 class="artipress-author-card-name">John Doe</h3>
        <p class="artipress-author-card-role">Senior Writer</p>
    </div>
</a>

</div>
        <!-- END ArtiPress (End of needed section)-->

    </main>

    <footer>
        <div class="container-page-content-width">
            <p>
                &copy; 2026 ArtiPress. All rights reserved.
            </p>
        </div>
    </footer>
</body>

</html>
