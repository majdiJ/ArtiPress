<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>{html_var(article_title)} - {html_var(website_title)}</title>

    <style>
        /*  PAGE SETUP  */
        @page {
            size: A4;
            margin: 20mm 18mm 25mm 18mm;
            /* top right bottom left */

            @top-left {
                content: "{html_var(article_title)} | {html_var(website_title)} ({html_var(base_url)})";
                font-size: 8pt;
                color: #888;
            }

            @bottom-left {
                content: "{html_var(base_url)}/{html_var(generated_articles_output_path)}/{html_var(article_id)}" "\A" "{html_var(article_authors)} | Published on {html_var(article_published_date)}{html_var(article_edited_date)}";
                white-space: pre;
                font-size: 8pt;
                color: #888;
            }

            @bottom-right {
                content: "Page " counter(page) " of " counter(pages);
                font-size: 8pt;
                color: #888;
            }
        }

        /* First page — no header or footer */
        @page :first {

            margin: 15mm 18mm 25mm 18mm;

            @top-left {
                content: "";
            }

            @bottom-left {
                content: "{html_var(base_url)}/{html_var(generated_articles_output_path)}/{html_var(article_id)}" "\A" "{html_var(article_authors)} | Published on {html_var(article_published_date)}{html_var(article_edited_date)}";
                white-space: pre;
                font-size: 8pt;
                color: #888;
            }

            @bottom-right {
                content: "Page " counter(page) " of " counter(pages);
                font-size: 8pt;
                color: #888;
            }
        }


        /*  BASIC PRINT BEHAVIOUR  */

        body {
            font-size: 11pt;
            line-height: 1.6;
            orphans: 3;
            widows: 3;
        }

        h1,
        h2,
        h3 {
            page-break-after: avoid;
            /* never leave a heading alone at a page bottom */
        }

        p {
            page-break-inside: auto;
        }

        figure,
        table,
        pre,
        blockquote {
            page-break-inside: avoid;
        }


        /*  SCREEN VIEW (non-print)  */

        .print-screen-message {
            display: none;
        }

        @media screen {
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: sans-serif;
            }

            .print-screen-message {
                display: block;
                text-align: center;
                max-width: 32rem;
                padding: 1rem;
            }

            .article-content {
                display: none;
            }
        }
    </style>

    <!-- === ArtiPress ===
    You must include variable/section below in your article list template (In the <head> section, in the middle) -->
    {html_var(articles_page_styling_and_scripts)}
    <!-- END ArtiPress (End of needed section)-->
</head>

<body>

    <div class="print-screen-message">
        <p>Print article: {html_var(article_title)}</p>
        <p>Your browser should auto open the print dialogue to allow you to print the article.</p>
        <p>If it doesn't auto open you can <a href="#" onclick="window.print(); return false;">click here to do it manually</a>.</p>
    </div>

    <script>
        window.addEventListener('load', function () {
            window.print();
        });
    </script>

    <!-- === ArtiPress ===
    You must include variable/section below in your article page template (In the <main> section, where you want the article content to appear) -->
    <div class="article-content">
        {html_var(article_page_main_article)}
    </div>
    <!-- END ArtiPress (End of needed section)-->

</body>

</html>
